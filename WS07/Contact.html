<div class="container py-5 text-white">
 
  <h1 class="text-center mb-5">Contact Me</h1>
 
  <div class="row align-items-center">
 
    <div class="col-md-6">
      <div class="contact-card">
 
        <form>
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" placeholder="Your name">
          </div>
 
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Your email">
          </div>
 
          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="4" placeholder="Write your message..."></textarea>
          </div>
 
          <button type="submit" class="btn btn-custom w-100">Send</button>
        </form>
 
      </div>
    </div>
 
    <div class="col-md-6 text-center">
      <img src="images/Qiyana-bw.jpg" class="contact-img" alt="Contact image">
    </div>
 
  </div>
</div>
